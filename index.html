<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LOOGIE — Avatar Store</title>
  </head>
  <body>
    <svg style="position:absolute;width:0;height:0">
      <filter id="displacement" x="-20%" y="-20%" width="140%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="2" result="noise">
          <animate attributeName="baseFrequency" values="0.015;0.018;0.015" dur="24s" repeatCount="indefinite" />
        </feTurbulence>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="8" xChannelSelector="R" yChannelSelector="G">
          <animate attributeName="scale" values="8;10;8" dur="20s" repeatCount="indefinite" />
        </feDisplacementMap>
      </filter>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
